<div id="root"></div>
<script>
// ---- Local storage shim (same API the app uses) ----
window.storage = {
  async get(k){ const v = localStorage.getItem("mi:"+k); if(v===null) throw new Error("not found"); return {key:k, value:v}; },
  async set(k,v){ localStorage.setItem("mi:"+k, v); return {key:k, value:v}; },
  async delete(k){ localStorage.removeItem("mi:"+k); return {key:k, deleted:true}; },
  async list(){ const keys=[]; for(let i=0;i<localStorage.length;i++){const key=localStorage.key(i); if(key&&key.startsWith("mi:")) keys.push(key.slice(3));} return {keys}; }
};
// ---- Anthropic API key handling (stored only on this device) ----
const _fetch = window.fetch.bind(window);
window.fetch = (url, opts = {}) => {
  if (typeof url === "string" && url.includes("api.anthropic.com")) {
    let key = localStorage.getItem("mi-key") || "";
    if (!key) {
      key = (window.prompt("Paste your Anthropic API key to power the AI coach (stored only on this device):") || "").trim();
      if (key) localStorage.setItem("mi-key", key);
    }
    opts.headers = Object.assign({}, opts.headers, {
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    });
  }
  return _fetch(url, opts);
};
</script>

// ---------- Nutrition calculator (doc formulas) ----------
const ACTIVITY = [
  { label: "Sedentary", mult: 13.5 },
  { label: "Lightly active", mult: 15.5 },
  { label: "Fairly active", mult: 17.5 },
  { label: "Very active", mult: 20.5 },
];
const GOALS = [
  { label: "Lose weight", delta: -400 },
  { label: "Maintain", delta: 0 },
  { label: "Gain muscle", delta: 400 },
];
function calcTargets(kg, activityIdx, goalIdx) {
  const lbs = kg * 2.2046;
  const kcal = Math.round(lbs * ACTIVITY[activityIdx].mult + GOALS[goalIdx].delta);
  const protein = Math.round(lbs * 0.82);
  const fat = Math.round(lbs * 0.45);
  const carbs = Math.max(0, Math.round((kcal - protein * 4 - fat * 9) / 4));
  return { kcal, protein, carbs, fat };
}

// ---------- Storage ----------
async function loadKey(key, fallback) {
  try { const r = await window.storage.get(key); return r ? JSON.parse(r.value) : fallback; }
  catch { return fallback; }
}
async function saveKey(key, value) {
  try { await window.storage.set(key, JSON.stringify(value)); } catch (e) { console.error(e); }
}

const COACH_KNOWLEDGE = `You are the Max Intensity coach — the training philosophy of a professional heavyweight fighter (boxing/Muay Thai). Speak direct, plain, motivating, no fluff.
TRAINING PHILOSOPHY: The four pillars are intensity, progressive overload, form, and adequate volume. Muscle is metabolically expensive — the body only builds it when forced, so work sets are trained hard. 100% of muscle fibres are only recruited near failure; intensity beats volume (sprinters vs marathon runners). Form decides the target muscle: feel the squeeze, flex through the movement, exhale on the lift. Low volume, full rest between sets; once growth is stimulated, stop — more is just damage. Train priority muscles first in the session. Track everything and beat it.
PROGRAM RULES: scheme 10/6/6/6 — two warm-up sets (10 then 6), one heavy work set at ~1 RIR, one back-off set at −10%. Tempo 4-3-2-1 on every rep. Rest 2–3 min heavy work (up to 5 if needed). Add ~2.5% load only where the work set hit 6 the previous week. Dips are bodyweight until cleared, then loaded. Week 6 deload: ~60% load, 2 sets.
NUTRITION: 90% of eating well is what you don't eat — homemade over shop-bought. Staples: meat, dairy, fruit, veg. Eat early and often; don't fight snacking. No banned foods, one free day a week. Bulking: ~70/30 clean/dirty, homemade milkshakes, red meat and dairy priority, 20% mince, rice and potatoes. Cutting: protein and wholefoods first. Calculator: calories = bodyweight(lbs) × activity (13–22); protein = lbs × 0.82 g; fat = lbs × 0.45 g; carbs fill the rest; ±300–500 kcal to gain/lose.
SUPPLEMENTS: creatine 5–10 g, protein powder, magnesium threonate 100 mg pre-bed, zinc up to 50 mg, vitamin D3 2000–4000 IU, omega-3 fish oil, optional pre-workout.
SLEEP: cold room, salt + sugar + water pre-bed, strict wind-down, limit bright light, warm shower an hour before, reading/slow breathing.`;

async function askCoach(history, program, week) {
  const system = `${COACH_KNOWLEDGE}
Current week: ${week + 1} of 6 (${WEEK_PLAN[week].tag} — ${WEEK_PLAN[week].cue})
Current program JSON: ${JSON.stringify(program)}
Respond ONLY with raw JSON, no markdown fences: {"reply": "short coaching answer", "program": null}
If asked to change the program, return the FULL updated program object (same schema) in "program" and summarise the change in "reply".`;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1500, system, messages: history }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || "API error");
  const text = (data.content || []).map((b) => (b.type === "text" ? b.text : "")).join("");
  return safeJSON(text);
}

function safeJSON(text) {
  const clean = text.replace(/```json|```/g, "").trim();
  try { return JSON.parse(clean); }
  catch {
    const m = clean.match(/\{[\s\S]*\}/);
    if (m) return JSON.parse(m[0]);
    throw new Error("no json");
  }
}

            <h2 className="brand text-base font-bold uppercase text-neutral-200">{day.name}</h2>
            <span className="mono text-xs text-neutral-500">{doneCount}/{day.exercises.length} done</span>
          </div>

          <ul className="mt-3 space-y-2">
            {day.exercises.map((exr, i) => {
              const log = dayLogs[i] || {};
              const cleared = clearedLastWeek(activeDay, i);
              const expanded = open === i;
              const setsToShow = isDeload ? 2 : exr.scheme.length;
              return (
                <li key={i} className={card + (log.done ? " opacity-60" : "")}>
                  <div className="flex items-start gap-3 p-3">
                    <button
                      onClick={() => toggleDone(activeDay, i)}
                      aria-label={log.done ? "Mark not done" : "Mark done"}
                      className={
                        "mt-0.5 h-5 w-5 shrink-0 rounded-sm border " +
                        (log.done ? "border-red-500 bg-red-600" : "border-neutral-600")
                      }
                    />
                    <button onClick={() => setOpen(expanded ? null : i)} className="min-w-0 flex-1 text-left">
                      <div className="flex items-center gap-2">
                        <p className="font-medium text-neutral-100">{exr.name}</p>
                        {cleared && !isDeload && (
                          <span className="mono rounded-sm bg-red-950 px-1.5 py-0.5 text-[10px] font-semibold text-red-400">
                            ▲ ADD LOAD
                          </span>
                        )}
                      </div>
                      <p className="mono mt-0.5 text-xs text-neutral-400">
                        {isDeload ? "2 sets · ~60% load" : exr.scheme.join(" / ")} · tempo {exr.tempo} · rest {exr.rest}
                      </p>
                      {exr.note ? <p className="mt-0.5 text-xs text-neutral-500">{exr.note}</p> : null}
                    </button>
                    <span className="mono mt-1 text-xs text-neutral-600">{expanded ? "−" : "+"}</span>
                  </div>

                  {expanded && (
                    <div className="border-t border-neutral-800 px-3 py-2">
                      {Array.from({ length: setsToShow }).map((_, s) => {
                        const setLog = getSet(week, activeDay, i, s);
                        const prev = lastWeight(activeDay, i, s);
                        return (
                          <div key={s} className="flex items-center gap-2 py-1.5">
                            <span className="mono w-32 shrink-0 text-[11px] text-neutral-500">
                              {isDeload ? `Set ${s + 1} ×6 easy` : SET_LABELS[s]}
                            </span>
                            <input
                              id={`w-${activeDay}-${i}-${s}`}
                              inputMode="decimal"
                              enterKeyHint="next"
                              value={setLog.weight || ""}
                              onChange={(e) => setSet(activeDay, i, s, "weight", e.target.value)}
                              onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); document.getElementById(`r-${activeDay}-${i}-${s}`)?.focus(); } }}
                              onFocus={() => setFocusField({ d: activeDay, i, s, kind: "w" })}
                              onBlur={() => setTimeout(() => setFocusField((f) => (f && f.d === activeDay && f.i === i && f.s === s && f.kind === "w" ? null : f)), 200)}
                              placeholder={prev ? `${prev} kg` : "kg"}
                              className="mono w-20 rounded-sm bg-neutral-800 px-2 py-1.5 text-right text-sm placeholder-neutral-600"
                              aria-label={`Set ${s + 1} weight`}
                            />
                            <input
                              id={`r-${activeDay}-${i}-${s}`}
                              inputMode="numeric"
                              enterKeyHint={s + 1 < setsToShow ? "next" : "done"}
                              value={setLog.reps || ""}
                              onChange={(e) => setSet(activeDay, i, s, "reps", e.target.value)}
                              onKeyDown={(e) => {
                                if (e.key === "Enter") {
                                  e.preventDefault();
                                  const nxt = document.getElementById(`w-${activeDay}-${i}-${s + 1}`);
                                  if (nxt) nxt.focus(); else e.target.blur();
                                }
                              }}
                              onFocus={() => setFocusField({ d: activeDay, i, s, kind: "r" })}
                              onBlur={() => setTimeout(() => setFocusField((f) => (f && f.d === activeDay && f.i === i && f.s === s && f.kind === "r" ? null : f)), 200)}
                              placeholder="reps"
                              className="mono w-16 rounded-sm bg-neutral-800 px-2 py-1.5 text-right text-sm placeholder-neutral-600"
                              aria-label={`Set ${s + 1} reps`}
                            />
                            <button
                              onClick={() => startRest(150)}
                              className="mono rounded-sm border border-neutral-700 px-2 py-1.5 text-xs text-neutral-400"
                              aria-label="Start rest timer"
                            >
                              ⏱
                            </button>
                            {prev && <span className="mono text-[10px] text-neutral-600">last wk: {prev}</span>}
                          </div>
                        );
                      })}
                      <p className="mono pb-1 pt-1 text-[10px] text-neutral-600">
                        Hit 6 on the work set → add ~2.5% next week
                      </p>
                    </div>
                  )}
                </li>
              );
            })}
          </ul>

          <button onClick={finishSession} className="brand mt-4 w-full rounded-md bg-red-600 py-3 text-xs font-semibold uppercase tracking-widest text-white">
            Finish session — save to calendar
          </button>
        </main>
      )}

      {/* ---------- EAT ---------- */}
      {tab === "nutrition" && (() => {
        const entries = foodLog[todayKey()] || [];
        const totals = entries.reduce(
          (t, e) => ({
            kcal: t.kcal + (Number(e.kcal) || 0),
            protein: t.protein + (Number(e.protein) || 0),
            carbs: t.carbs + (Number(e.carbs) || 0),
            fat: t.fat + (Number(e.fat) || 0),
          }),
          { kcal: 0, protein: 0, carbs: 0, fat: 0 }
        );
        const needSetup = !targets || showCalc;
        const bars = [["kcal", "Calories", ""], ["protein", "Protein", "g"], ["carbs", "Carbs", "g"], ["fat", "Fat", "g"]];
        const gaining = profile?.goalIdx === 2;
        const meals = profile?.goalIdx === 0 ? CUT_MEALS : gaining ? GAIN_MEALS : [...GAIN_MEALS, ...CUT_MEALS];

        return (
          <main className="p-4 pb-24">
            {needSetup ? (
              <div className={card + " p-4"}>
                <h2 className="brand text-sm font-bold uppercase text-neutral-200">Your numbers</h2>
                <p className="mt-1 text-xs text-neutral-500">
                  Calculated the Max Intensity way: bodyweight × activity, protein at 0.82 g/lb, fat at 0.45 g/lb, carbs fill the rest.
                </p>
                <label className="mt-3 block text-xs text-neutral-400">Bodyweight (kg)</label>
                <input
                  inputMode="decimal"
                  value={calcKg}
                  onChange={(e) => setCalcKg(e.target.value)}
                  className="mono mt-1 w-28 rounded-sm bg-neutral-800 px-2 py-1.5 text-sm"
                />
                <label className="mt-3 block text-xs text-neutral-400">Activity</label>
                <div className="mt-1 flex flex-wrap gap-1.5">
                  {ACTIVITY.map((a, i) => (
                    <button
                      key={a.label}
                      onClick={() => setCalcAct(i)}
                      className={
                        "rounded-sm px-2.5 py-1.5 text-xs " +
                        (calcAct === i ? "bg-red-600 text-white" : "border border-neutral-700 text-neutral-400")
                      }
                    >
                      {a.label}
                    </button>
                  ))}
                </div>
                <label className="mt-3 block text-xs text-neutral-400">Goal</label>
                <div className="mt-1 flex flex-wrap gap-1.5">
                  {GOALS.map((g, i) => (
                    <button
                      key={g.label}
                      onClick={() => setCalcGoal(i)}
                      className={
                        "rounded-sm px-2.5 py-1.5 text-xs " +
                        (calcGoal === i ? "bg-red-600 text-white" : "border border-neutral-700 text-neutral-400")
                      }
                    >
                      {g.label}
                    </button>
                  ))}
                </div>
                <button onClick={applyCalc} className="brand mt-4 w-full rounded-sm bg-red-600 py-2.5 text-xs font-semibold uppercase tracking-widest text-white">
                  Set my targets
                </button>
              </div>
            ) : (
              <>
                <div className="flex items-center justify-between">
                  <h2 className="brand text-base font-bold uppercase text-neutral-200">Today</h2>
                  <button onClick={() => setShowCalc(true)} className="rounded-sm border border-neutral-700 px-2.5 py-1 text-xs text-neutral-400">
                    Recalculate
                  </button>
                </div>

                <div className="mt-3 space-y-2.5">
                  {bars.map(([k, label, unit]) => {
                    const pct = Math.min(100, (totals[k] / (targets[k] || 1)) * 100);
                    return (
                      <div key={k}>
                        <div className="flex items-baseline justify-between">
                          <span className="text-xs text-neutral-400">{label}</span>
                          <span className="mono text-xs text-neutral-300">{Math.round(totals[k])} / {targets[k]}{unit}</span>
                        </div>
                        <div className="mt-1 h-1.5 rounded-full bg-neutral-800">
                          <div className={"h-1.5 rounded-full " + (k === "protein" ? "bg-red-500" : "bg-neutral-400")} style={{ width: pct + "%" }} />
                        </div>
                      </div>
                    );
                  })}
                </div>

                <p className="brand mt-5 text-[11px] font-semibold uppercase tracking-widest text-neutral-500">
                  {gaining ? "Gain meals — tap to log" : profile?.goalIdx === 0 ? "Cut meals — tap to log" : "Meals — tap to log"}
                </p>
                <div className="mt-2 flex gap-2 overflow-x-auto pb-1">
                  {meals.map((m) => (
                    <button key={m.name} onClick={() => logMeal(m)} className={card + " shrink-0 px-3 py-2 text-left"}>
                      <p className="text-xs font-medium text-neutral-200">{m.name}</p>
                      <p className="mono mt-0.5 text-[10px] text-neutral-500">{m.kcal} kcal · P{m.protein}</p>
                    </button>
                  ))}
                </div>

                <p className="brand mt-5 text-[11px] font-semibold uppercase tracking-widest text-neutral-500">
                  Micronutrient snacks — tap to log
                </p>
                <p className="mt-0.5 text-[11px] text-neutral-600">Built to fill the cofactor gaps for recovery, collagen &amp; test.</p>
                <div className="mt-2 space-y-2">
                  {MICRO_SNACKS
                    .filter((m) => m.tag === "both" || (profile?.goalIdx === 0 ? m.tag === "cut" : profile?.goalIdx === 2 ? m.tag === "bulk" : true))
                    .map((m) => (
                      <button key={m.name} onClick={() => logMeal({ name: m.name, kcal: m.kcal, protein: m.protein, carbs: m.carbs, fat: m.fat })} className={card + " flex w-full items-center gap-3 px-3 py-2 text-left"}>
                        <div className="min-w-0 flex-1">
                          <p className="text-xs font-medium text-neutral-200">{m.name}</p>
                          <p className="mt-0.5 text-[10px] text-red-400">{m.rich}</p>
                        </div>
                        <span className="mono shrink-0 text-[10px] text-neutral-500">{m.kcal} kcal · P{m.protein}</span>
                      </button>
                    ))}
                </div>

                {/* My foods */}
                <p className="brand mt-5 text-[11px] font-semibold uppercase tracking-widest text-neutral-500">My foods</p>
                <p className="mt-0.5 text-[11px] text-neutral-600">Add foods you actually like — the meal builder uses them.</p>
                <div className="mt-2 flex gap-2">
                  <input
                    value={foodLikeInput}
                    onChange={(e) => setFoodLikeInput(e.target.value)}
                    onKeyDown={(e) => e.key === "Enter" && addMyFood()}
                    placeholder="e.g. mince, rice, mango, eggs"
                    className="flex-1 rounded-md border border-neutral-800 bg-neutral-900 px-3 py-2 text-sm placeholder-neutral-600"
                  />
                  <button onClick={addMyFood} className="brand rounded-md border border-neutral-700 px-3 text-xs font-semibold uppercase text-neutral-300">Add</button>
                </div>
                {myFoods.length > 0 && (
                  <div className="mt-2 flex flex-wrap gap-1.5">
                    {myFoods.map((f) => (
                      <span key={f} className="mono flex items-center gap-1.5 rounded-full border border-neutral-700 px-2.5 py-1 text-xs text-neutral-300">
                        {f}
                        <button onClick={() => setMyFoods((prev) => prev.filter((x) => x !== f))} className="text-neutral-500" aria-label={`Remove ${f}`}>✕</button>
                      </span>
                    ))}
                  </div>
                )}
                <button
                  onClick={runMealBuilder({
                    kcal: Math.max(0, targets.kcal - Math.round(totals.kcal)),
                    protein: Math.max(0, targets.protein - Math.round(totals.protein)),
                    carbs: Math.max(0, targets.carbs - Math.round(totals.carbs)),
                    fat: Math.max(0, targets.fat - Math.round(totals.fat)),
                  })}
                  disabled={buildingMeal}
                  className="brand mt-2 w-full rounded-md bg-red-600 py-2.5 text-xs font-semibold uppercase tracking-widest text-white disabled:opacity-50"
                >
                  {buildingMeal ? "Building…" : "Build me a meal from my foods"}
                </button>
                {mealIdea && (
                  <div className={card + " mt-2 p-3"}>
                    <div className="flex items-start justify-between gap-2">
                      <div className="min-w-0">
                        <p className="text-sm font-medium text-neutral-100">{mealIdea.name}</p>
                        <p className="mt-0.5 text-xs text-neutral-400">{mealIdea.how}</p>
                        <p className="mono mt-1 text-xs text-neutral-500">{mealIdea.kcal} kcal · P{mealIdea.protein} C{mealIdea.carbs} F{mealIdea.fat}</p>
                      </div>
                      <button
                        onClick={() => { logMeal({ name: mealIdea.name, kcal: mealIdea.kcal, protein: mealIdea.protein, carbs: mealIdea.carbs, fat: mealIdea.fat }); setMealIdea(null); }}
                        className="brand shrink-0 rounded-sm bg-red-600 px-3 py-1.5 text-[10px] font-semibold uppercase text-white"
                      >
                        Log it
                      </button>
                    </div>
                  </div>
                )}

                {/* Swap machine */}
                <p className="brand mt-5 text-[11px] font-semibold uppercase tracking-widest text-neutral-500">Swap machine</p>
                <p className="mt-0.5 text-[11px] text-neutral-600">Tell it a habit — it gives you smarter swaps, never bans.</p>
                <div className="mt-2 flex gap-2">
                  <input
                    value={swapInput}
                    onChange={(e) => setSwapInput(e.target.value)}
                    onKeyDown={(e) => e.key === "Enter" && runSwaps()}
                    placeholder="e.g. I drink loads of fizzy drinks"
                    className="flex-1 rounded-md border border-neutral-800 bg-neutral-900 px-3 py-2 text-sm placeholder-neutral-600"
                  />
                  <button onClick={runSwaps} disabled={swapping} className="brand rounded-md bg-red-600 px-3 text-xs font-semibold uppercase text-white disabled:opacity-50">
                    {swapping ? "…" : "Swap"}
                  </button>
                </div>
                {swaps.length > 0 && (
                  <div className="mt-2 space-y-2">
                    {swaps.map((s, i) => (
                      <div key={i} className={card + " p-3"}>
                        {s.from && <p className="text-sm text-neutral-200"><span className="text-neutral-500 line-through">{s.from}</span> → <span className="font-medium">{s.to}</span></p>}
                        <p className="mt-0.5 text-xs text-neutral-400">{s.why}</p>
                      </div>
                    ))}
                  </div>
                )}

                <p className="brand mt-5 text-[11px] font-semibold uppercase tracking-widest text-neutral-500">Quick log</p>
                <div className="mt-2 flex gap-2">
                  <input
                    value={foodInput}
                    onChange={(e) => setFoodInput(e.target.value)}
                    onKeyDown={(e) => e.key === "Enter" && addFood()}
                    placeholder="e.g. 300g mince, potatoes, glass of milk"
                    className="flex-1 rounded-md border border-neutral-800 bg-neutral-900 px-3 py-2.5 text-sm placeholder-neutral-600"
                  />
                  <button onClick={addFood} disabled={estimating} className="brand rounded-md bg-red-600 px-4 text-xs font-semibold uppercase text-white disabled:opacity-50">
                    {estimating ? "…" : "Log"}
                  </button>
                </div>
                <p className="mono mt-1.5 text-[10px] text-neutral-600">AI estimates the macros. Estimates only — weigh the big stuff.</p>

                <ul className="mt-4 space-y-2">
                  {entries.length === 0 && (
                    <li className="rounded-md border border-dashed border-neutral-800 p-4 text-center text-sm text-neutral-600">
                      Nothing logged today. Eat early — tell your body there's no need to store.
                    </li>
                  )}
                  {entries.map((e, i) => (
                    <li key={i} className={card + " flex items-center gap-3 p-3"}>
                      <div className="min-w-0 flex-1">
                        <p className="truncate text-sm text-neutral-100">{e.name}</p>
                        <p className="mono mt-0.5 text-xs text-neutral-500">{e.kcal} kcal · P{e.protein} C{e.carbs} F{e.fat}</p>
                      </div>
                      <button onClick={() => removeFood(i)} className="mono text-xs text-neutral-600" aria-label={`Remove ${e.name}`}>✕</button>
                    </li>
                  ))}
                </ul>
              </>
            )}
          </main>
        );
      })()}

      {/* ---------- LOG / CALENDAR ---------- */}
      {tab === "calendar" && (() => {
        const y = calMonth.getFullYear();
        const m = calMonth.getMonth();
        const firstOffset = (new Date(y, m, 1).getDay() + 6) % 7; // Monday first
        const daysInMonth = new Date(y, m + 1, 0).getDate();
        const ds = (d) => `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
        const monthName = calMonth.toLocaleDateString("en-GB", { month: "long", year: "numeric" });
        const sel = history[selDate];
        const selBw = weights[selDate];
        const bwEntries = Object.entries(weights).sort((a, b) => a[0].localeCompare(b[0])).slice(-14);
        const bwVals = bwEntries.map(([, v]) => v);
        const bwMin = Math.min(...bwVals), bwMax = Math.max(...bwVals);
        const spark = bwVals.length > 1
          ? bwVals.map((v, i) => `${(i / (bwVals.length - 1)) * 100},${bwMax === bwMin ? 20 : 38 - ((v - bwMin) / (bwMax - bwMin)) * 36}`).join(" ")
          : null;
        return (
          <main className="p-4 pb-24">
            {/* Bodyweight quick log */}
            <div className="rounded-md border border-neutral-800 bg-neutral-900 p-3">
              <div className="flex items-center gap-2">
                <div className="min-w-0 flex-1">
                  <p className="brand text-xs font-semibold uppercase text-neutral-200">Daily bodyweight</p>
                  <p className="mt-0.5 text-[11px] text-neutral-500">Weigh at the same time each day — morning, after the toilet, before food.</p>
                </div>
                <input
                  inputMode="decimal"
                  value={bwInput}
                  onChange={(e) => setBwInput(e.target.value)}
                  placeholder={weights[todayKey()] ? `${weights[todayKey()]} kg` : "kg"}
                  className="mono w-20 rounded-sm bg-neutral-800 px-2 py-1.5 text-right text-sm placeholder-neutral-600"
                  aria-label="Bodyweight in kg"
                />
                <button onClick={saveBodyweight} className="brand rounded-sm bg-red-600 px-3 py-1.5 text-[10px] font-semibold uppercase text-white">
                  Save
                </button>
              </div>
              {spark && (
                <div className="mt-2">
                  <svg viewBox="0 0 100 40" className="h-10 w-full" preserveAspectRatio="none" aria-hidden="true">
                    <polyline points={spark} fill="none" stroke="#ef4444" strokeWidth="2" vectorEffect="non-scaling-stroke" />
                  </svg>
                  <p className="mono text-[10px] text-neutral-600">last {bwVals.length} weigh-ins · {bwVals[bwVals.length - 1]} kg latest</p>
                </div>
              )}
            </div>

            {/* Month grid */}
            <div className="mt-4 flex items-center justify-between">
              <button onClick={() => setCalMonth(new Date(y, m - 1, 1))} className="rounded-sm border border-neutral-700 px-2.5 py-1 text-sm text-neutral-400" aria-label="Previous month">‹</button>
              <h2 className="brand text-sm font-bold uppercase text-neutral-200">{monthName}</h2>
              <button onClick={() => setCalMonth(new Date(y, m + 1, 1))} className="rounded-sm border border-neutral-700 px-2.5 py-1 text-sm text-neutral-400" aria-label="Next month">›</button>
            </div>
            <div className="mono mt-2 grid grid-cols-7 gap-1 text-center text-[10px] text-neutral-600">
              {["M", "T", "W", "T2", "F", "S", "S2"].map((d) => <div key={d}>{d.charAt(0)}</div>)}
            </div>
            <div className="mt-1 grid grid-cols-7 gap-1">
              {Array.from({ length: firstOffset }).map((_, i) => <div key={"e" + i} />)}
              {Array.from({ length: daysInMonth }).map((_, i) => {
                const dnum = i + 1;
                const dstr = ds(dnum);
                const trained = !!history[dstr];
                const weighed = weights[dstr] != null;
                const isSel = selDate === dstr;
                const isToday = dstr === todayKey();
                return (
                  <button
                    key={dstr}
                    onClick={() => setSelDate(dstr)}
                    className={
                      "flex aspect-square flex-col items-center justify-center rounded-sm text-xs " +
                      (isSel ? "bg-red-600 text-white" : isToday ? "border border-red-500 text-neutral-200" : "bg-neutral-900 text-neutral-400")
                    }
                  >
                    <span className="mono">{dnum}</span>
                    <span className="flex gap-0.5">
                      {trained && <span className={"h-1 w-1 rounded-full " + (isSel ? "bg-white" : "bg-red-500")} />}
                      {weighed && <span className={"h-1 w-1 rounded-full " + (isSel ? "bg-white/60" : "bg-neutral-500")} />}
                    </span>
                  </button>
                );
              })}
            </div>
            <p className="mono mt-1.5 text-[10px] text-neutral-600"><span className="text-red-500">●</span> trained · <span className="text-neutral-500">●</span> weighed in</p>

            {/* Selected day detail */}
            <div className="mt-4 rounded-md border border-neutral-800 bg-neutral-900 p-3">
              <p className="brand text-xs font-semibold uppercase text-neutral-200">
                {new Date(selDate + "T12:00:00").toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "short" })}
              </p>
              {selBw != null && <p className="mono mt-1 text-xs text-neutral-400">Bodyweight: {selBw} kg</p>}
              {sel ? (
                <div className="mt-2">
                  <p className="mono text-xs text-red-400">{sel.day} · Week {sel.week}</p>
                  <ul className="mt-1.5 space-y-1">
                    {sel.items.map((it, i) => (
                      <li key={i} className="flex items-baseline justify-between gap-2 text-sm">
                        <span className="min-w-0 truncate text-neutral-300">{it.name}</span>
                        <span className="mono shrink-0 text-xs text-neutral-500">
                          {it.sets.filter((s) => s.w || s.r).map((s) => `${s.w || "?"}×${s.r || "?"}`).join("  ") || "—"}
                        </span>
                      </li>
                    ))}
                  </ul>
                </div>
              ) : (
                !selBw && <p className="mt-1.5 text-sm text-neutral-600">Nothing logged this day.</p>
              )}
            </div>
          </main>
        );
      })()}

      {/* ---------- RULES ---------- */}
      {tab === "rules" && (
        <main className="space-y-5 p-4 pb-24">
          <section>
            <h2 className="brand text-sm font-bold uppercase tracking-widest text-red-500">The four pillars</h2>
            <div className="mt-2 space-y-2">
              {PILLARS.map((p) => (
                <div key={p.title} className={card + " p-3"}>
                  <p className="brand text-xs font-semibold uppercase text-neutral-200">{p.title}</p>
                  <p className="mt-1 text-sm text-neutral-400">{p.body}</p>
                </div>
              ))}
            </div>
          </section>
          <section>
            <h2 className="brand text-sm font-bold uppercase tracking-widest text-red-500">Eating rules</h2>
            <ul className="mt-2 space-y-1.5">
              {NUTRITION_RULES.map((r, i) => (
                <li key={i} className="flex gap-2 text-sm text-neutral-400">
                  <span className="mono text-red-800">—</span>{r}
                </li>
              ))}
            </ul>
          </section>
          <section>
            <h2 className="brand text-sm font-bold uppercase tracking-widest text-red-500">Supplements</h2>
            <ul className="mt-2 space-y-1.5">
              {SUPPLEMENTS.map((r, i) => (
                <li key={i} className="flex gap-2 text-sm text-neutral-400">
                  <span className="mono text-red-800">—</span>{r}
                </li>
              ))}
            </ul>
          </section>
          <section>
            <h2 className="brand text-sm font-bold uppercase tracking-widest text-red-500">Sleep</h2>
            <ul className="mt-2 space-y-1.5">
              {SLEEP_RULES.map((r, i) => (
                <li key={i} className="flex gap-2 text-sm text-neutral-400">
                  <span className="mono text-red-800">—</span>{r}
                </li>
              ))}
            </ul>
          </section>
        </main>
      )}

      {/* ---------- COACH ---------- */}
      {tab === "coach" && (
        <main className="flex h-[calc(100vh-200px)] flex-col">
          <div className="flex-1 space-y-3 overflow-y-auto p-4">
            {chat.length === 0 && (
              <div className="mt-8 text-center">
                <p className="brand text-sm font-bold uppercase tracking-widest text-neutral-200">The Max Intensity coach</p>
                <p className="mx-auto mt-2 max-w-xs text-sm text-neutral-500">
                  Trained on your philosophy — intensity, overload, form, volume, nutrition, and sleep. Ask anything, or tell it to change the program.
                </p>
                <div className="mx-auto mt-4 flex max-w-xs flex-col gap-2">
                  {[
                    "I stalled on incline press — what now?",
                    "Build me a bulking day of meals for my targets",
                    "Why only this much volume?",
                  ].map((s) => (
                    <button key={s} onClick={() => setInput(s)} className={card + " px-3 py-2 text-left text-sm text-neutral-300"}>
                      {s}
                    </button>
                  ))}
                </div>
              </div>
            )}
            {chat.map((m, i) => (
              <div
                key={i}
                className={
                  "max-w-[85%] rounded-md px-3 py-2 text-sm " +
                  (m.role === "user" ? "ml-auto bg-red-700/80 text-white" : card + " text-neutral-200")
                }
              >
                {m.content}
              </div>
            ))}
            {thinking && (
              <div className={card + " mono w-fit px-3 py-2 text-xs text-neutral-500"}>coach is thinking…</div>
            )}
            <div ref={chatEnd} />
          </div>
          <div className="flex gap-2 border-t border-neutral-800 p-3">
            <input
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && send()}
              placeholder="Ask your coach…"
              className="flex-1 rounded-md border border-neutral-800 bg-neutral-900 px-3 py-2.5 text-sm placeholder-neutral-600"
            />
            <button onClick={send} disabled={thinking} className="brand rounded-md bg-red-600 px-4 text-xs font-semibold uppercase text-white disabled:opacity-50">
              Send
            </button>
          </div>
        </main>
      )}

      {/* ---------- NEXT FIELD BAR (shows while typing) ---------- */}
      {focusField && tab === "program" && (
        <div className="fixed inset-x-3 bottom-3 z-50 flex gap-2">
          <button
            onPointerDown={(e) => { e.preventDefault(); focusNext(); }}
            className="brand flex-1 rounded-md bg-red-600 py-3 text-sm font-bold uppercase tracking-widest text-white shadow-lg"
          >
            ✓ Next
          </button>
          <button
            onPointerDown={(e) => { e.preventDefault(); document.activeElement?.blur(); setFocusField(null); }}
            className="brand rounded-md border border-neutral-700 bg-neutral-900 px-4 text-xs font-semibold uppercase text-neutral-300 shadow-lg"
          >
            Done
          </button>
        </div>
      )}

      {/* ---------- REST TIMER BAR ---------- */}
      {restLeft !== null && (
        <div className={"fixed inset-x-3 z-40 rounded-md border border-red-800 bg-neutral-900/95 p-3 shadow-lg " + (focusField && tab === "program" ? "bottom-20" : "bottom-3")}>
          <div className="flex items-center gap-3">
            <span className="brand text-[10px] font-semibold uppercase tracking-widest text-red-500">Rest</span>
            <span className="mono text-2xl font-semibold text-neutral-100">
              {Math.floor(Math.max(0, restLeft) / 60)}:{String(Math.max(0, restLeft) % 60).padStart(2, "0")}
            </span>
            <div className="mx-1 h-1.5 flex-1 rounded-full bg-neutral-800">
              <div className="h-1.5 rounded-full bg-red-600 transition-all" style={{ width: `${(Math.max(0, restLeft) / restTotal) * 100}%` }} />
            </div>
            <button onClick={() => setRestLeft((s) => (s === null ? null : s + 30))} className="mono rounded-sm border border-neutral-700 px-2 py-1 text-xs text-neutral-300">+30</button>
            <button onClick={() => setRestLeft(null)} className="mono rounded-sm border border-neutral-700 px-2 py-1 text-xs text-neutral-400">End</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MaxIntensityApp />);
</script>
</body>
</html>
